# /etc/systemd/journald.conf
# Logs vollständig im RAM halten — keine SD-Karten-Schreibzugriffe durch journald
#
# Deploy:
#   sudo cp journald.conf /etc/systemd/journald.conf
#   sudo systemctl restart systemd-journald

[Journal]
Storage=volatile
Compress=yes
# RAM-Limit: max. 64 MB für Logs
RuntimeMaxUse=64M
RuntimeKeepFree=16M
